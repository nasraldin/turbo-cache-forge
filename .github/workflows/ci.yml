name: CI

# PRs run tests. Pushes to main and version tags run tests AND, only if they pass,
# build + publish the Docker images. Image publishing is a job that `needs` the test
# jobs, so a red build can never ship an image.
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- Go: services/api (needs Postgres) + services/cli ----------------------
  go:
    name: go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [api, cli]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tcf
          POSTGRES_PASSWORD: tcf
          POSTGRES_DB: tcf
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tcf"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/${{ matrix.module }}/go.sum

      # DB-backed repo tests self-skip unless TEST_DATABASE_URL is set. Apply the
      # goose migrations first so the schema exists, then let the tests run.
      - name: Apply migrations (api only)
        if: matrix.module == 'api'
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.27.2
          "$(go env GOPATH)/bin/goose" -dir infra/migrations postgres \
            "postgres://tcf:tcf@localhost:5432/tcf?sslmode=disable" up

      - name: Vet
        working-directory: services/${{ matrix.module }}
        run: go vet ./...

      - name: Test
        working-directory: services/${{ matrix.module }}
        env:
          TEST_DATABASE_URL: ${{ matrix.module == 'api' && 'postgres://tcf:tcf@localhost:5432/tcf?sslmode=disable' || '' }}
        run: go test -race ./...

  # ---- JS: dashboard + docs + shared packages via Turborepo ------------------
  js:
    name: js (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test

  # ---- Docker: build + publish, ONLY after tests pass, ONLY on push ----------
  docker:
    name: docker (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: [go, js]
    if: github.event_name == 'push' && github.repository == 'nasraldin/turbo-cache-forge'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: infra/docker/Dockerfile
            target: cache-api
          - name: migrate
            dockerfile: infra/docker/Dockerfile
            target: goose
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/nasraldin/turbo-cache-forge-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only the dashboard image consumes build args; the others ignore them.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_ORG_ENABLED=false
