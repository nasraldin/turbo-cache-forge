name: CI

# PRs run tests. Pushes to main and version tags run tests AND, only if they pass,
# build + publish the Docker images. Image publishing is a job that `needs` the test
# jobs, so a red build can never ship an image.
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
# Cancel superseded PR runs, but NEVER cancel a push to main/tags — a canceled
# release run can abort image publishing halfway (it did once, when a Dependabot
# merge landed while the docker job was still building migrate + dashboard).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ---- Go: services/api (sqlite + postgres dialects) + services/cli ----------
  go:
    name: go (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: cli, module: cli, db: none }
          - { name: api-sqlite, module: api, db: sqlite }
          - { name: api-postgres, module: api, db: postgres }
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tcf
          POSTGRES_PASSWORD: tcf
          POSTGRES_DB: tcf
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tcf"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: services/${{ matrix.module }}/go.sum
      - name: Vet
        working-directory: services/${{ matrix.module }}
        run: go vet ./...
      - name: Test
        working-directory: services/${{ matrix.module }}
        env:
          # api-postgres exercises the Postgres dialect; api-sqlite and cli use
          # the built-in defaults (temp-file SQLite / no DB). The repo tests
          # self-migrate, so no external goose step is needed.
          TEST_DATABASE_URL: ${{ matrix.db == 'postgres' && 'postgres://tcf:tcf@localhost:5432/tcf?sslmode=disable' || '' }}
        run: go test -race ./...

  # ---- JS: dashboard + docs + shared packages via Turborepo ------------------
  js:
    name: js (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test
      # Build the docs on PRs too. docs.yml only builds on push-to-main, so without
      # this a docs-breaking dependency bump (e.g. an Astro major) would pass PR CI
      # and only fail after merge. Guard it here.
      - run: pnpm --filter docs build

  # ---- Docker: build + publish, ONLY after tests pass, ONLY on push ----------
  docker:
    name: docker (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: [go, js]
    if: github.event_name == 'push' && github.repository == 'nasraldin/turbo-cache-forge'
    permissions:
      contents: read
      packages: write # push to ghcr.io with the auto-provisioned GITHUB_TOKEN
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: infra/docker/Dockerfile
            target: cache-api
          - name: migrate
            dockerfile: infra/docker/Dockerfile
            target: goose
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish to both registries — users pull from whichever they prefer. The
      # image is built once and tagged for both; metadata-action fans the tag set
      # across every name listed here.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            docker.io/nasraldin/turbo-cache-forge-${{ matrix.image.name }}
            ghcr.io/nasraldin/turbo-cache-forge-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only the dashboard image consumes build args; the others ignore them.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_ORG_ENABLED=false
