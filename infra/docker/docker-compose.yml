services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tcf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tcf}
      POSTGRES_DB: ${POSTGRES_DB:-tcf}
    # No published port: only cache-api and migrate reach Postgres, over the
    # compose network. Nothing external needs direct DB access.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcf}"]
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: goose
    depends_on:
      postgres: { condition: service_healthy }
    command: ["-dir", "/migrations", "postgres",
      "postgres://${POSTGRES_USER:-tcf}:${POSTGRES_PASSWORD:-tcf}@postgres:5432/${POSTGRES_DB:-tcf}?sslmode=disable", "up"]

  cache-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: cache-api
    depends_on:
      migrate: { condition: service_completed_successfully }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tcf}:${POSTGRES_PASSWORD:-tcf}@postgres:5432/${POSTGRES_DB:-tcf}?sslmode=disable
      STORAGE_BACKEND: fs
      STORAGE_PATH: /data
      # OIDC is off unless OIDC_ISSUER is set (then /api/v1 mounts). OIDC_ORG_ENABLED=false
      # is personal mode: no Clerk org needed, tenant = user's `sub`, audience check skipped.
      # Personal mode is only safe when OIDC_ISSUER is DEDICATED to this app — a Clerk
      # instance/IdP realm shared with other apps would let any of their tokens in.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_ORG_CLAIM: ${OIDC_ORG_CLAIM:-org_id}
      OIDC_ORG_ENABLED: ${OIDC_ORG_ENABLED:-true}
      # Browser origins allowed to call /api/v1 (the dashboard). Empty = CORS off.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # How often the in-memory hit/miss counters flush to usage_daily. Default 300s
      # (prod); lower it locally so dashboard stats update within seconds.
      USAGE_ROLLUP_INTERVAL_SEC: ${USAGE_ROLLUP_INTERVAL_SEC:-300}
    volumes: ["cache-data:/data"]
    ports: ["8080:8080"]

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        # publishable key is public + baked into the client bundle at build time
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk}
        # false (default) hides <OrganizationSwitcher/>; set true only if Clerk orgs are enabled
        NEXT_PUBLIC_ORG_ENABLED: ${NEXT_PUBLIC_ORG_ENABLED:-false}
    depends_on:
      cache-api: { condition: service_started }
    environment:
      # server-side (middleware) reads these at runtime; publishable also passed so the server has it
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_dummyplaceholderforbuildonly0000000000}
    ports: ["3000:3000"]

volumes:
  cache-data:
